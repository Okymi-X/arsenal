# golangci-lint configuration for arsenal.
# Run: golangci-lint run ./...

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocyclo
    - misspell
    - unconvert
    - unparam
    - nakedret
    - bodyclose
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
        - name: error-strings
        - name: error-return

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
