name: Registry check

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "tools/regcheck/**"
      - "tools/regbuild/**"
      - ".github/workflows/registry-check.yml"
  pull_request:
    paths:
      - "registry/**"
      - "tools/regcheck/**"
      - "tools/regbuild/**"
  schedule:
    # Weekly bot run: catch upstream versions that were yanked or moved.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify registry versions exist upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify registry.toml is assembled from its segments
        run: go run ./tools/regbuild -verify
      - name: Verify against PyPI and GitHub
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./tools/regcheck -registry registry/registry.toml
