# Authored here; assembled into registry/registry.toml by tools/regbuild.
# Contains only [[tool]] blocks - no top-level keys.

[[tool]]
name = "updog"
aliases = []
description = "Simple HTTP/HTTPS file server for transfers"
repo = "https://github.com/sc0tfree/updog"
homepage = "https://github.com/sc0tfree/updog"
category = "misc"
install_method = "pip"
python_version = ">=3.6"
binary = "updog"
tags = ["file-transfer", "http", "exfil"]
requires_root = false
notes = "Handy for quick file transfers during post-exploitation."

  [[tool.version]]
  tag = "1.4"
  commit = ""
  tested = true
  pip_spec = "updog==1.4"
  date = "2020-03-01"
  notes = "Stable release."

