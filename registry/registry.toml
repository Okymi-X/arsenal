# arsenal curated registry
#
# This file is the canonical, in-repo catalog of tested, known-good versions of
# offensive-security tooling. It is embedded in the binary and synced to the
# user's data directory. See docs/registry-format.md for the full schema.
#
# Every version in this file is verified against its official source (PyPI for
# pip tools, the upstream Git repository for gitpip/gobin/cargo tools) by the
# registry-check CI workflow. Do not add a version that does not exist upstream.

version = "1"
updated = "2026-06-14"

