# arsenal curated registry
#
# This file is the canonical, in-repo catalog of tested, known-good versions of
# offensive-security tooling. It is embedded in the binary and synced to the
# user's data directory. See docs/registry-format.md for the full schema.
#
# Every version in this file is verified against its official source (PyPI for
# pip tools, the upstream Git repository for gitpip/gobin/cargo tools) by the
# registry-check CI workflow. Do not add a version that does not exist upstream.

version = "1"
updated = "2026-06-14"

[[tool]]
name = "netexec"
aliases = ["nxc", "cme"]
description = "Network execution tool, successor to CrackMapExec"
repo = "https://github.com/Pennyw0rth/NetExec"
homepage = "https://www.netexec.wiki"
category = "ad"
install_method = "gitpip"
python_version = ">=3.9"
binary = "nxc"
binaries = ["nxcdb"]
tags = ["smb", "ldap", "winrm", "lateral-movement", "active-directory"]
requires_root = false
notes = "Not published on PyPI; installed from the pinned Git tag."

  [[tool.version]]
  tag = "badsuccessor"
  commit = "feat/refactor-badsuccessor"
  repo = "https://github.com/azoxlpf/NetExec"
  tested = false
  pip_spec = ""
  date = "2026-03-19"
  notes = "Fork branch with the BadSuccessor refactor; tracks a moving branch, not reproducible."

  [[tool.version]]
  tag = "1.5.1"
  commit = "v1.5.1"
  tested = true
  pip_spec = ""
  date = "2025-12-01"
  notes = "Recommended stable release."

